name: Deploy to Zone

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ZONE_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.ZONE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist to Zone
        run: |
          rsync -avz --delete dist/ ${{ secrets.ZONE_USER }}@${{ secrets.ZONE_HOST }}:${{ secrets.ZONE_PATH }}